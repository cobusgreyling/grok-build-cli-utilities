name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Mypy type check
        run: python -m mypy src/grok_build_cli_utilities --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          python -m pytest -q --cov=src/grok_build_cli_utilities --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to artifact (optional)
        uses: actions/upload-artifact@v7
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml

      - name: Verify wheel builds cleanly
        run: |
          python -m pip install build twine -q
          python -m build --wheel --outdir /tmp/dist-ci
          python -m twine check /tmp/dist-ci/*.whl
